AWSTemplateFormatVersion: '2010-09-09'
Description: rozellerz.com — Monitoring (SNS, CloudWatch Alarms) — prod only

Parameters:
  Environment:
    Type: String
    AllowedValues: [prod, dev]
    Default: dev

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Resources:

  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: IsProd
    Properties:
      TopicName: !Sub '${Environment}-rozellerz-alarms'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-lambda-errors'
      AlarmDescription: Lambda errors > 5 in 5 minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !ImportValue
            !Sub '${Environment}-rozellerz-lambda-name'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-lambda-throttles'
      AlarmDescription: Lambda throttled invocations detected
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !ImportValue
            !Sub '${Environment}-rozellerz-lambda-name'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-api-5xx'
      AlarmDescription: API Gateway 5xx errors > 5 in 5 minutes
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !ImportValue
            !Sub '${Environment}-rozellerz-http-api-id'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  DLQMessageAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-dlq-messages'
      AlarmDescription: Dead letter queue received messages
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !ImportValue
            !Sub '${Environment}-rozellerz-dlq-name'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  WafBlockedAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-waf-blocked'
      AlarmDescription: WAF blocked > 100 requests in 5 minutes
      Namespace: AWS/WAFV2
      MetricName: BlockedRequests
      Dimensions:
        - Name: WebACL
          Value: !ImportValue
            !Sub '${Environment}-rozellerz-waf-name'
        - Name: Region
          Value: us-east-1
        - Name: Rule
          Value: ALL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

Outputs:
  AlarmTopicArn:
    Condition: IsProd
    Value: !Ref AlarmTopic
    Export:
      Name: !Sub '${Environment}-rozellerz-alarm-topic'
