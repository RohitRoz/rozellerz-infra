AWSTemplateFormatVersion: '2010-09-09'
Description: rozellerz.com — WAF (Web Application Firewall)

Parameters:
  Environment:
    Type: String
    AllowedValues: [prod, dev]
    Default: dev

Resources:
  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${Environment}-rozellerz-waf'
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${Environment}RozellerzWaf'
      Rules:
        - Name: AWSCommonRules
          Priority: 1
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CommonRules
        - Name: AWSKnownBadInputs
          Priority: 2
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: KnownBadInputs
        - Name: AWSSQLiRules
          Priority: 3
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: SQLiRules
        - Name: AWSAnonIPList
          Priority: 4
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAnonymousIpList
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AnonIPList
        - Name: AWSIPReputationList
          Priority: 5
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: IPReputationList
        - Name: RateLimit
          Priority: 10
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimit

Outputs:
  WafWebAclArn:
    Value: !GetAtt WafWebAcl.Arn
    Export:
      Name: !Sub '${Environment}-rozellerz-waf-arn'
  WafWebAclName:
    Value: !Sub '${Environment}-rozellerz-waf'
    Export:
      Name: !Sub '${Environment}-rozellerz-waf-name'
