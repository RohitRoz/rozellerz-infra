AWSTemplateFormatVersion: '2010-09-09'
Description: rozellerz.com — API (Lambda, API Gateway, IAM, Log Groups)

Parameters:
  Environment:
    Type: String
    AllowedValues: [prod, dev]
    Default: dev
  DomainName:
    Type: String
    Default: rozellerz.com
  DeployBucketName:
    Type: String
    Description: Bootstrap S3 bucket for Lambda deployment artifacts
  WriteApiSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Bearer token for PUT/DELETE API routes

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  HasWriteSecret: !Not [!Equals [!Ref WriteApiSecret, '']]

Resources:

  # =========================================
  #  CloudWatch — Log Groups
  # =========================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${Environment}-rozellerz-api'
      RetentionInDays: !If [IsProd, 90, 14]
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${Environment}-rozellerz-access'
      RetentionInDays: !If [IsProd, 90, 14]
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =========================================
  #  IAM — Lambda Execution Role
  # =========================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-rozellerz-lambda'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaLogging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt LambdaLogGroup.Arn
                  - !Sub '${LambdaLogGroup.Arn}:*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DynamoDBRead
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - Fn::ImportValue: !Sub '${Environment}-rozellerz-pages-table-arn'
              - Sid: DynamoDBWrite
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource:
                  - Fn::ImportValue: !Sub '${Environment}-rozellerz-pages-table-arn'
        - PolicyName: DeadLetterQueueAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - Fn::ImportValue: !Sub '${Environment}-rozellerz-dlq-arn'

  # =========================================
  #  Lambda — API Backend
  # =========================================
  ApiFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub '${Environment}-rozellerz-api'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 10
      MemorySize: 256
      DeadLetterConfig:
        TargetArn:
          Fn::ImportValue: !Sub '${Environment}-rozellerz-dlq-arn'
      Code:
        S3Bucket: !Ref DeployBucketName
        S3Key: lambda/api.zip
      Environment:
        Variables:
          TABLE_NAME:
            Fn::ImportValue: !Sub '${Environment}-rozellerz-pages-table'
          ENVIRONMENT: !Ref Environment
          ALLOWED_ORIGIN: !If
            - IsProd
            - !Sub 'https://www.${DomainName}'
            - '*'
          WRITE_SECRET: !If
            - HasWriteSecret
            - !Ref WriteApiSecret
            - ''
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =========================================
  #  API Gateway — HTTP API
  # =========================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${Environment}-rozellerz-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !If
            - IsProd
            - !Sub 'https://www.${DomainName}'
            - '*'
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: ['Content-Type', 'Authorization', 'X-Api-Key']
        MaxAge: 86400

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'

  ApiRouteGetPages:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/pages'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiRouteGetPage:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/pages/{slug}'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiRoutePutPage:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PUT /api/pages/{slug}'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiRouteDeletePage:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'DELETE /api/pages/{slug}'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.path","status":"$context.status","latency":"$context.responseLatency","userAgent":"$context.identity.userAgent","time":"$context.requestTime"}'

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

Outputs:
  HttpApiId:
    Value: !Ref HttpApi
    Export:
      Name: !Sub '${Environment}-rozellerz-http-api-id'
  HttpApiDomain:
    Value: !Sub '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${Environment}-rozellerz-http-api-domain'
  ApiEndpoint:
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${Environment}-rozellerz-api-endpoint'
  LambdaFunctionName:
    Value: !Ref ApiFunction
    Export:
      Name: !Sub '${Environment}-rozellerz-lambda-name'
