AWSTemplateFormatVersion: '2010-09-09'
Description: rozellerz.com - Dynamic site with S3 + CloudFront + Lambda + API Gateway + DynamoDB + WAF + hardened security

Parameters:
  Environment:
    Type: String
    AllowedValues: [prod, dev]
    Default: dev
  DomainName:
    Type: String
    Default: rozellerz.com
  AcmCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN (us-east-1). Leave blank for dev.
  DeployBucketName:
    Type: String
    Description: Pre-created S3 bucket for Lambda deployment artifacts (bootstrap resource)
  WriteApiSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Bearer token required for PUT/DELETE API routes. Leave blank to skip auth (dev only).

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  HasCertificate: !Not [!Equals [!Ref AcmCertificateArn, '']]
  HasWriteSecret: !Not [!Equals [!Ref WriteApiSecret, '']]

Resources:

  # =========================================
  #  S3 — Access Logging
  # =========================================
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Environment}-rozellerz-access-logs'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 90
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      Tags:
        - Key: Environment
          Value: !Ref Environment

  AccessLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccessLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AccessLogBucket.Arn}/*'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'

  # =========================================
  #  S3 — Static Assets
  # =========================================
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - IsProd
        - !Ref DomainName
        - !Sub 'dev-${DomainName}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: !Sub 's3-access/${Environment}/'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =========================================
  #  DynamoDB — Page Content
  # =========================================
  PagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Environment}-rozellerz-pages'
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: !If [IsProd, true, false]
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      AttributeDefinitions:
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: slug
          KeyType: HASH
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =========================================
  #  SQS — Lambda Dead Letter Queue
  # =========================================
  LambdaDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${Environment}-rozellerz-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      SqsManagedSseEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =========================================
  #  CloudWatch — Log Groups (bounded retention)
  # =========================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${Environment}-rozellerz-api'
      RetentionInDays: !If [IsProd, 90, 14]
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${Environment}-rozellerz-access'
      RetentionInDays: !If [IsProd, 90, 14]
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =========================================
  #  IAM — Lambda Execution Role
  # =========================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-rozellerz-lambda'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaLogging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt LambdaLogGroup.Arn
                  - !Sub '${LambdaLogGroup.Arn}:*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DynamoDBRead
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt PagesTable.Arn
              - Sid: DynamoDBWrite
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt PagesTable.Arn
        - PolicyName: DeadLetterQueueAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt LambdaDeadLetterQueue.Arn

  # =========================================
  #  Lambda — API Backend
  # =========================================
  ApiFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub '${Environment}-rozellerz-api'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 10
      MemorySize: 256
      DeadLetterConfig:
        TargetArn: !GetAtt LambdaDeadLetterQueue.Arn
      Code:
        S3Bucket: !Ref DeployBucketName
        S3Key: lambda/api.zip
      Environment:
        Variables:
          TABLE_NAME: !Ref PagesTable
          ENVIRONMENT: !Ref Environment
          ALLOWED_ORIGIN: !If
            - IsProd
            - !Sub 'https://www.${DomainName}'
            - '*'
          WRITE_SECRET: !If
            - HasWriteSecret
            - !Ref WriteApiSecret
            - ''
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =========================================
  #  API Gateway — HTTP API
  # =========================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${Environment}-rozellerz-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !If
            - IsProd
            - !Sub 'https://www.${DomainName}'
            - '*'
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: ['Content-Type', 'Authorization', 'X-Api-Key']
        MaxAge: 86400

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'

  ApiRouteGetPages:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/pages'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiRouteGetPage:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/pages/{slug}'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiRoutePutPage:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PUT /api/pages/{slug}'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiRouteDeletePage:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'DELETE /api/pages/{slug}'
      Target: !Sub 'integrations/${ApiIntegration}'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.path","status":"$context.status","latency":"$context.responseLatency","userAgent":"$context.identity.userAgent","time":"$context.requestTime"}'

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  # =========================================
  #  WAF — Web Application Firewall
  # =========================================
  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${Environment}-rozellerz-waf'
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${Environment}RozellerzWaf'
      Rules:
        - Name: AWSCommonRules
          Priority: 1
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CommonRules
        - Name: AWSKnownBadInputs
          Priority: 2
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: KnownBadInputs
        - Name: AWSSQLiRules
          Priority: 3
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: SQLiRules
        - Name: AWSAnonIPList
          Priority: 4
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAnonymousIpList
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AnonIPList
        - Name: AWSIPReputationList
          Priority: 5
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: IPReputationList
        - Name: RateLimit
          Priority: 10
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimit

  # =========================================
  #  CloudFront — Security Headers
  # =========================================
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${Environment}-rozellerz-security-headers'
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.execute-api.us-east-1.amazonaws.com"
            Override: true

  # =========================================
  #  CloudFront — OAC + Distribution
  # =========================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${Environment}-rozellerz-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub '${Environment} - rozellerz.com'
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        WebACLId: !GetAtt WafWebAcl.Arn
        Aliases: !If
          - HasCertificate
          - - !If [IsProd, !Ref DomainName, !Ref 'AWS::NoValue']
            - !If [IsProd, !Sub 'www.${DomainName}', !Ref 'AWS::NoValue']
          - !Ref 'AWS::NoValue'
        ViewerCertificate: !If
          - HasCertificate
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ApiOrigin
            DomainName: !Sub '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        CacheBehaviors:
          - PathPattern: '/api/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ---- S3 Bucket Policy: CloudFront OAC + SSL-only ----
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt SiteBucket.Arn
              - !Sub '${SiteBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  # =========================================
  #  CloudWatch — Alarms (prod only)
  # =========================================

  # SNS topic for alarm notifications
  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: IsProd
    Properties:
      TopicName: !Sub '${Environment}-rozellerz-alarms'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Lambda error rate spike
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-lambda-errors'
      AlarmDescription: Lambda function errors > 5 in 5 minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # Lambda throttling
  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-lambda-throttles'
      AlarmDescription: Lambda throttled invocations detected
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # API Gateway 5xx errors
  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-api-5xx'
      AlarmDescription: API Gateway 5xx errors > 5 in 5 minutes
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # DLQ messages (failed Lambda invocations)
  DLQMessageAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-dlq-messages'
      AlarmDescription: Dead letter queue received messages
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt LambdaDeadLetterQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # WAF blocked requests spike
  WafBlockedAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub '${Environment}-rozellerz-waf-blocked'
      AlarmDescription: WAF blocked > 100 requests in 5 minutes
      Namespace: AWS/WAFV2
      MetricName: BlockedRequests
      Dimensions:
        - Name: WebACL
          Value: !Sub '${Environment}-rozellerz-waf'
        - Name: Region
          Value: us-east-1
        - Name: Rule
          Value: ALL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

# =========================================
#  Outputs
# =========================================
Outputs:
  BucketName:
    Value: !Ref SiteBucket
    Export:
      Name: !Sub '${Environment}-rozellerz-bucket'
  DeployBucketName:
    Value: !Ref DeployBucketName
    Export:
      Name: !Sub '${Environment}-rozellerz-deploy-bucket'
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${Environment}-rozellerz-cf-id'
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${Environment}-rozellerz-cf-domain'
  ApiEndpoint:
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${Environment}-rozellerz-api'
  PagesTableName:
    Value: !Ref PagesTable
  LambdaFunctionName:
    Value: !Ref ApiFunction
  SiteUrl:
    Value: !If
      - IsProd
      - !Sub 'https://www.${DomainName}'
      - !Sub 'https://${CloudFrontDistribution.DomainName}'
  AccessLogBucketName:
    Value: !Ref AccessLogBucket
  DLQUrl:
    Value: !Ref LambdaDeadLetterQueue
