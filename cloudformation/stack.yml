AWSTemplateFormatVersion: '2010-09-09'
Description: rozellerz.com - S3 static site with CloudFront CDN

Parameters:
  Environment:
    Type: String
    AllowedValues: [prod, dev]
    Default: dev
  DomainName:
    Type: String
    Default: rozellerz.com
  AcmCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN (us-east-1). Leave blank for dev.

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  HasCertificate: !Not [!Equals [!Ref AcmCertificateArn, '']]

Resources:
  # --- S3 Bucket ---
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - IsProd
        - !Ref DomainName
        - !Sub 'dev-${DomainName}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # --- CloudFront Origin Access Control ---
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${Environment}-rozellerz-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- CloudFront Distribution ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub '${Environment} - rozellerz.com'
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCertificate
          - - !If [IsProd, !Ref DomainName, !Ref 'AWS::NoValue']
            - !If [IsProd, !Sub 'www.${DomainName}', !Ref 'AWS::NoValue']
          - !Ref 'AWS::NoValue'
        ViewerCertificate: !If
          - HasCertificate
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # --- S3 Bucket Policy for CloudFront OAC ---
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

Outputs:
  BucketName:
    Value: !Ref SiteBucket
    Export:
      Name: !Sub '${Environment}-rozellerz-bucket'
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${Environment}-rozellerz-cf-id'
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${Environment}-rozellerz-cf-domain'
  SiteUrl:
    Value: !If
      - IsProd
      - !Sub 'https://www.${DomainName}'
      - !Sub 'https://${CloudFrontDistribution.DomainName}'
