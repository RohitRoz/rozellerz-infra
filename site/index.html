<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rozelle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #FAFAF7;
    position: relative;
    font-family: 'DM Mono', monospace;
  }

  .canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .canvas.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

  .bg-lines {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; transition: transform 0.15s ease-out;
  }
  .connector-line {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .connector-line path {
    stroke-dasharray: 6 4; stroke-dashoffset: 1200;
    animation: drawLine 2.5s ease-out forwards;
  }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }

  .node {
    position: absolute; width: 26px; height: 26px; border-radius: 50%;
    background: radial-gradient(circle, #7FFF00, #00CC66);
    box-shadow: 0 0 18px 6px rgba(0,204,102,0.35);
    transform: translate(-50%, -50%); opacity: 0; z-index: 5;
    animation: fadeIn 0.6s ease-out forwards, pulse 3s ease-in-out infinite;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .node:hover {
    transform: translate(-50%, -50%) scale(1.3);
    box-shadow: 0 0 28px 12px rgba(0,204,102,0.55);
  }
  .node-cursor {
    position: absolute; top: -28px; left: 50%;
    transform: translateX(-50%); pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .node-cursor .icon-mouse, .node-cursor .icon-click { transition: opacity 0.2s ease; }
  .node-cursor .icon-mouse { opacity: 1; }
  .node-cursor .icon-click { opacity: 0; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
  .node:hover .node-cursor .icon-mouse { opacity: 0; }
  .node:hover .node-cursor .icon-click { opacity: 1; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 18px 6px rgba(0,204,102,0.35); }
    50% { box-shadow: 0 0 24px 10px rgba(0,204,102,0.5); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%,-50%) translateY(12px); }
    to { opacity: 1; transform: translate(-50%,-50%) translateY(0); }
  }
  .node-1 { left: 7.57%; top: 5.89%; animation-delay: 0s, 0s; }
  .node-2 { left: 19.1%; top: 22.89%; animation-delay: 0.15s, 0.15s; }
  .node-3 { left: 31.6%; top: 40.67%; animation-delay: 0.3s, 0.3s; }
  .node-4 { left: 44.58%; top: 57%; animation-delay: 0.45s, 0.45s; }
  .node-5 { left: 53.82%; top: 68.56%; animation-delay: 0.6s, 0.6s; }
  .node-6 { left: 71.53%; top: 90.56%; animation-delay: 0.75s, 0.75s; }

  .label {
    position: absolute; text-align: left; pointer-events: none;
    opacity: 0; animation: fadeSlideIn 0.6s ease-out forwards;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .label .main { font-size: 13px; font-weight: 500; color: #1A1A1A; letter-spacing: 0.02em; white-space: nowrap; }
  .label .sub { font-size: 10.5px; font-weight: 300; color: #AAAAAA; letter-spacing: 0.02em; margin-top: 2px; white-space: nowrap; }
  .label-1 { left: 9.5%; top: 4.6%; animation-delay: 0.1s; }
  .label-2 { left: 21.2%; top: 21.6%; animation-delay: 0.25s; }
  .label-3 { left: 33.7%; top: 39.4%; animation-delay: 0.4s; }
  .label-4 { left: 46.6%; top: 55.7%; animation-delay: 0.55s; }
  .label-5 { left: 56.3%; top: 67.8%; animation-delay: 0.7s; }
  .label-6 { left: 73.6%; top: 89.2%; animation-delay: 0.85s; }
  .sidebar {
    position: absolute; right: 0; top: 0; width: 56px; height: 100%;
    background: linear-gradient(180deg, #00CC66, #009944);
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; z-index: 10;
  }
  .sidebar-dot { width: 14px; height: 14px; border-radius: 50%; background: #7FFF00; box-shadow: 0 0 8px 3px rgba(127,255,0,0.4); margin-top: 21px; }
  .sidebar-text { writing-mode: vertical-rl; text-orientation: mixed; font-family: 'Monoton', cursive; font-size: 11px; color: rgba(255,255,255,0.9); letter-spacing: 6px; margin-top: 30px; text-transform: uppercase; }
  .sidebar-line { position: absolute; bottom: 30px; width: 24px; height: 1px; background: rgba(255,255,255,0.3); }
  .search-container { position: absolute; right: 66px; top: 14px; opacity: 0; transform: translateX(10px); transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; z-index: 11; }
  .search-container.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .search-container input { width: 260px; height: 36px; border: 1.5px solid #00CC66; border-radius: 20px; background: #FAFAF7; padding: 0 16px; font-family: 'DM Mono', monospace; font-size: 13px; color: #1A1A1A; outline: none; }
  .search-container input::placeholder { color: #AAAAAA; }
  .smiley { position: absolute; left: 40px; bottom: 28px; font-family: 'Monoton', cursive; font-size: 28px; color: rgba(0,170,85,0.28); pointer-events: none; user-select: none; }

  .page-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FAFAF7; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; overflow-y: auto; }
  .page-overlay.active { opacity: 1; pointer-events: auto; }
  .page-inner { max-width: 720px; margin: 0 auto; padding: 80px 40px 120px; opacity: 0; transform: translateY(30px); transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s; }
  .page-overlay.active .page-inner { opacity: 1; transform: translateY(0); }
  .page-back { display: inline-flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 12px; color: #00AA55; text-decoration: none; cursor: pointer; margin-bottom: 48px; letter-spacing: 0.05em; transition: color 0.2s; }
  .page-back:hover { color: #00CC66; }
  .page-back svg { transition: transform 0.2s; }
  .page-back:hover svg { transform: translateX(-3px); }
  .page-dot { width: 18px; height: 18px; border-radius: 50%; background: radial-gradient(circle, #7FFF00, #00CC66); box-shadow: 0 0 14px 4px rgba(0,204,102,0.3); margin-bottom: 20px; }
  .page-title { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: #1A1A1A; margin-bottom: 8px; letter-spacing: -0.01em; }
  .page-subtitle { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 300; color: #AAAAAA; margin-bottom: 48px; }
  .page-body { font-family: 'DM Mono', monospace; font-size: 14px; line-height: 1.8; color: #444; }
  .page-body p { margin-bottom: 20px; }
  .page-body h3 { font-size: 16px; font-weight: 500; color: #1A1A1A; margin: 40px 0 16px; }
  .page-divider { width: 40px; height: 2px; background: linear-gradient(90deg, #7FFF00, #00CC66); border-radius: 2px; margin-bottom: 32px; }
  .page-tag { display: inline-block; padding: 4px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 11px; color: #888; margin: 0 6px 8px 0; }
  .page-loading { color: #AAAAAA; font-size: 13px; }
</style>
</head>
<body>
<div class="canvas" id="canvas">
  <svg class="bg-lines" id="bgLines" viewBox="0 0 1440 900" preserveAspectRatio="none">
    <g opacity="0.18">
      <path d="M1.5 60C50 48 80 53 109 53C180 53 251.5 -3.5 440 79C595 68 791.5 54 996 51C1207.5 68 1407.5 108 1402 117" stroke="#00CC66" stroke-width="1.5" fill="none"/>
      <path d="M-115 206C164.5 173.5 417.5 237 615 206C815 166 915 166 1115 206C1315 246 1365 246 1565 206" stroke="#00CC66" stroke-width="1.5" fill="none"/>
      <path d="M-103 400.5C177 370 477 392 677 362C877 331 977 331 1177 362C1377 392 1427 431 1577 400" stroke="#00CC66" stroke-width="1.5" fill="none"/>
      <path d="M-96 506.6C184 467 434 546 684 507C934 467 984 467 1234 507C1484 546 1434 546 1584 507" stroke="#009944" stroke-width="1.5" fill="none"/>
      <path d="M-105 642.6C245 603 345 683 595 643C845 603 895 603 1145 643C1395 683 1445 683 1545 643" stroke="#009944" stroke-width="1.5" fill="none"/>
      <path d="M-73 836.7C227 797 377 877 627 837C877 797 927 797 1177 837C1427 877 1427 877 1577 837" stroke="#00AA55" stroke-width="1.5" fill="none"/>
    </g>
  </svg>
  <svg class="connector-line" viewBox="0 0 1440 900" preserveAspectRatio="none">
    <path d="M123 60.2C187 117 238 173 310 235C382 296 413 338 485 394C557 451 598 481 670 533C742 584 783 625 855 676C927 728 958 759 1030 810" stroke="#00CC66" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  </svg>

  <div class="node node-1" data-page="rohit"><div class="node-cursor"><svg class="icon-mouse" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4L10.5 20.5L13 13L20.5 10.5L4 4Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/></svg><svg class="icon-click" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 3V1M5.06 5.06L3.64 3.64M5.06 13L3.64 14.36M13 5.06L14.36 3.64M3 9H1" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/><path d="M9 9L15.5 21.5L17.5 15.5L23.5 13.5L9 9Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1" stroke-linejoin="round"/></svg></div></div>
  <div class="node node-2" data-page="data-engineer"><div class="node-cursor"><svg class="icon-mouse" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4L10.5 20.5L13 13L20.5 10.5L4 4Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/></svg><svg class="icon-click" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 3V1M5.06 5.06L3.64 3.64M5.06 13L3.64 14.36M13 5.06L14.36 3.64M3 9H1" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/><path d="M9 9L15.5 21.5L17.5 15.5L23.5 13.5L9 9Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1" stroke-linejoin="round"/></svg></div></div>
  <div class="node node-3" data-page="data-analyst"><div class="node-cursor"><svg class="icon-mouse" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4L10.5 20.5L13 13L20.5 10.5L4 4Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/></svg><svg class="icon-click" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 3V1M5.06 5.06L3.64 3.64M5.06 13L3.64 14.36M13 5.06L14.36 3.64M3 9H1" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/><path d="M9 9L15.5 21.5L17.5 15.5L23.5 13.5L9 9Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1" stroke-linejoin="round"/></svg></div></div>
  <div class="node node-4" data-page="designer"><div class="node-cursor"><svg class="icon-mouse" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4L10.5 20.5L13 13L20.5 10.5L4 4Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/></svg><svg class="icon-click" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 3V1M5.06 5.06L3.64 3.64M5.06 13L3.64 14.36M13 5.06L14.36 3.64M3 9H1" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/><path d="M9 9L15.5 21.5L17.5 15.5L23.5 13.5L9 9Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1" stroke-linejoin="round"/></svg></div></div>
  <div class="node node-5" data-page="art"><div class="node-cursor"><svg class="icon-mouse" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4L10.5 20.5L13 13L20.5 10.5L4 4Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/></svg><svg class="icon-click" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 3V1M5.06 5.06L3.64 3.64M5.06 13L3.64 14.36M13 5.06L14.36 3.64M3 9H1" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/><path d="M9 9L15.5 21.5L17.5 15.5L23.5 13.5L9 9Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1" stroke-linejoin="round"/></svg></div></div>
  <div class="node node-6" data-page="rozelle"><div class="node-cursor"><svg class="icon-mouse" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4L10.5 20.5L13 13L20.5 10.5L4 4Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/></svg><svg class="icon-click" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 3V1M5.06 5.06L3.64 3.64M5.06 13L3.64 14.36M13 5.06L14.36 3.64M3 9H1" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/><path d="M9 9L15.5 21.5L17.5 15.5L23.5 13.5L9 9Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1" stroke-linejoin="round"/></svg></div></div>

  <div class="label label-1"><div class="main">rohit</div><div class="sub">engineer</div></div>
  <div class="label label-2"><div class="main">data engineer</div><div class="sub">engineering</div></div>
  <div class="label label-3"><div class="main">data analyst</div><div class="sub">data engineer</div></div>
  <div class="label label-4"><div class="main">designer</div><div class="sub">design engineer</div></div>
  <div class="label label-5"><div class="main">art</div><div class="sub">rz flow</div></div>
  <div class="label label-6"><div class="main">rozelle</div><div class="sub">designer</div></div>

  <div class="sidebar" id="sidebar"><div class="sidebar-dot"></div><div class="sidebar-text">rohit + rozelle</div><div class="sidebar-line"></div></div>
  <div class="search-container" id="searchContainer"><input type="text" placeholder="search..."></div>
  <div class="smiley">:)</div>
</div>
<div class="page-overlay" id="pageOverlay">
  <div class="page-inner" id="pageInner">
    <a class="page-back" id="pageBack">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      back
    </a>
    <div class="page-dot"></div>
    <div class="page-title" id="pageTitle"></div>
    <div class="page-subtitle" id="pageSubtitle"></div>
    <div class="page-divider"></div>
    <div class="page-body" id="pageBody"></div>
  </div>
</div>

<script>
  // ---- API config (auto-detect: same origin /api or fallback data) ----
  const API_BASE = '/api';

  // Fallback content if API is unavailable
  const fallbackPages = {
    'rohit': { title:'rohit', subtitle:'engineer', body:'<p>The starting point. Everything on this map connects back here. Engineer, creator, builder.</p>', tags:['Python','JavaScript','AWS','Automation'] },
    'data-engineer': { title:'data engineer', subtitle:'engineering', body:'<p>Building the pipelines and infrastructure that turn raw data into something usable.</p>', tags:['SQL','Python','AWS','Spark','Airflow'] },
    'data-analyst': { title:'data analyst', subtitle:'data engineer', body:'<p>Finding the story inside the numbers. Pattern recognition at scale.</p>', tags:['Pandas','SQL','Tableau','Excel','Statistics'] },
    'designer': { title:'designer', subtitle:'design engineer', body:'<p>Where engineering meets aesthetics.</p>', tags:['Figma','CSS','SVG','Typography','Motion'] },
    'art': { title:'art', subtitle:'rz flow', body:'<p>The creative layer. Music, comedy, visual experiments, and everything in between.</p>', tags:['Music Production','Stand-Up Comedy','Creative Writing','Visual Art'] },
    'rozelle': { title:'rozelle', subtitle:'designer', body:'<p>The destination. Where it all comes together.</p>', tags:['Python','JavaScript','AWS','Web Development','Automation'] }
  };

  // ---- Fetch page from API with fallback ----
  async function fetchPage(pageId) {
    try {
      const res = await fetch(`${API_BASE}/pages/${pageId}`);
      if (!res.ok) throw new Error(res.status);
      return await res.json();
    } catch (e) {
      console.log('API unavailable, using fallback for:', pageId);
      return fallbackPages[pageId] || null;
    }
  }

  function renderTags(tags) {
    if (!tags || !tags.length) return '';
    return '<div style="margin-top:20px">' + tags.map(t => `<span class="page-tag">${t}</span>`).join('') + '</div>';
  }

  // ---- DOM refs ----
  const canvas = document.getElementById('canvas');
  const overlay = document.getElementById('pageOverlay');
  const pageTitle = document.getElementById('pageTitle');
  const pageSubtitle = document.getElementById('pageSubtitle');
  const pageBody = document.getElementById('pageBody');
  const pageBack = document.getElementById('pageBack');
  const sidebar = document.getElementById('sidebar');
  const searchContainer = document.getElementById('searchContainer');
  const bgLines = document.getElementById('bgLines');

  // ---- Open page (dynamic fetch) ----
  document.querySelectorAll('.node').forEach(node => {
    node.addEventListener('click', async () => {
      const key = node.dataset.page;
      canvas.classList.add('hidden');
      overlay.classList.add('active');
      overlay.scrollTop = 0;

      pageTitle.textContent = key;
      pageSubtitle.textContent = '';
      pageBody.innerHTML = '<p class="page-loading">loading...</p>';

      const data = await fetchPage(key);
      if (data) {
        pageTitle.textContent = data.title || key;
        pageSubtitle.textContent = data.subtitle || '';
        pageBody.innerHTML = (data.body || '') + renderTags(data.tags);
      } else {
        pageBody.innerHTML = '<p>Page not found.</p>';
      }
    });
  });

  // ---- Close page ----
  function closePage() {
    overlay.classList.remove('active');
    setTimeout(() => canvas.classList.remove('hidden'), 300);
  }
  pageBack.addEventListener('click', closePage);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (overlay.classList.contains('active')) closePage();
      searchContainer.classList.remove('active');
    }
  });

  // ---- Sidebar search ----
  sidebar.addEventListener('click', () => {
    searchContainer.classList.toggle('active');
    if (searchContainer.classList.contains('active'))
      searchContainer.querySelector('input').focus();
  });

  // ---- Parallax ----
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 8;
    const y = (e.clientY / window.innerHeight - 0.5) * 4;
    bgLines.style.transform = `translate(${x}px, ${y}px)`;
  });
</script>
</body>
</html>
