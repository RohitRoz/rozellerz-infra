name: Teardown Stack

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options: [dev, prod]
      confirm:
        description: 'Type DESTROY to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  teardown:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set variables
        id: env
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "ENV=$ENV" >> $GITHUB_OUTPUT
          echo "PREFIX=rozellerz-${ENV}" >> $GITHUB_OUTPUT

      - name: Empty S3 buckets
        run: |
          SITE_BUCKET="${{ steps.env.outputs.ENV == 'prod' && 'rozellerz.com' || 'dev-rozellerz.com' }}"
          DEPLOY_BUCKET="${{ steps.env.outputs.ENV }}-rozellerz-deploy"
          LOG_BUCKET="${{ steps.env.outputs.ENV }}-rozellerz-access-logs"
          for BUCKET in "$SITE_BUCKET" "$DEPLOY_BUCKET" "$LOG_BUCKET"; do
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "Emptying $BUCKET..."
              aws s3 rm "s3://${BUCKET}" --recursive
              aws s3api list-object-versions --bucket "$BUCKET" --output json \
                | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for v in data.get('Versions', []) + data.get('DeleteMarkers', []):
              print(v['Key'], v['VersionId'])
          " | while read key vid; do
                aws s3api delete-object --bucket "$BUCKET" --key "$key" --version-id "$vid" 2>/dev/null || true
              done
            fi
          done

      - name: Disable DynamoDB deletion protection (prod)
        if: steps.env.outputs.ENV == 'prod'
        run: |
          TABLE="${{ steps.env.outputs.ENV }}-rozellerz-pages"
          aws dynamodb update-table --table-name "$TABLE" --no-deletion-protection-enabled 2>/dev/null || true

      # ---- Delete stacks in reverse dependency order ----
      - name: "Delete 1/5: Monitoring"
        run: |
          STACK="${{ steps.env.outputs.PREFIX }}-monitoring"
          aws cloudformation delete-stack --stack-name "$STACK" 2>/dev/null || true
          aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null || true

      - name: "Delete 2/5: CDN"
        run: |
          STACK="${{ steps.env.outputs.PREFIX }}-cdn"
          aws cloudformation delete-stack --stack-name "$STACK"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK"

      - name: "Delete 3/5: API"
        run: |
          STACK="${{ steps.env.outputs.PREFIX }}-api"
          aws cloudformation delete-stack --stack-name "$STACK"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK"

      - name: "Delete 4/5: WAF"
        run: |
          STACK="${{ steps.env.outputs.PREFIX }}-waf"
          aws cloudformation delete-stack --stack-name "$STACK"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK"

      - name: "Delete 5/5: Foundation"
        run: |
          STACK="${{ steps.env.outputs.PREFIX }}-foundation"
          aws cloudformation delete-stack --stack-name "$STACK"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK"

      - name: Delete deploy bucket (bootstrap, not in CF)
        run: |
          DEPLOY_BUCKET="${{ steps.env.outputs.ENV }}-rozellerz-deploy"
          if aws s3api head-bucket --bucket "$DEPLOY_BUCKET" 2>/dev/null; then
            aws s3api delete-bucket --bucket "$DEPLOY_BUCKET"
          fi

      - name: Teardown summary
        run: |
          echo "## 🗑️ Destroyed ${{ steps.env.outputs.ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All 5 stacks deleted:" >> $GITHUB_STEP_SUMMARY
          echo "- monitoring → cdn → api → waf → foundation" >> $GITHUB_STEP_SUMMARY
