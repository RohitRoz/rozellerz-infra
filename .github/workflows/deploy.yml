name: Deploy rozellerz.com

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options: [prod, dev]
      seed_db:
        description: 'Seed DynamoDB with page content'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DOMAIN_NAME: rozellerz.com
  ACM_CERT_ARN: arn:aws:acm:us-east-1:882951811364:certificate/4f22715e-3c41-4c9e-98e8-f4cc630eef7b

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment variables
        id: env
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "ENV=$ENV" >> $GITHUB_OUTPUT
          echo "PREFIX=rozellerz-${ENV}" >> $GITHUB_OUTPUT
          if [[ "$ENV" == "prod" ]]; then
            echo "CERT_ARN=${{ env.ACM_CERT_ARN }}" >> $GITHUB_OUTPUT
          else
            echo "CERT_ARN=" >> $GITHUB_OUTPUT
          fi

      # ---- Bootstrap: deploy bucket ----
      - name: Create deploy bucket if needed
        run: |
          DEPLOY_BUCKET="${{ steps.env.outputs.ENV }}-rozellerz-deploy"
          if ! aws s3api head-bucket --bucket "$DEPLOY_BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$DEPLOY_BUCKET" --region ${{ env.AWS_REGION }}
            aws s3api put-bucket-encryption --bucket "$DEPLOY_BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$DEPLOY_BUCKET" \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          fi

      # ---- Package & upload Lambda ----
      - name: Package Lambda
        run: cd api && zip -r ../lambda-api.zip . && cd ..

      - name: Upload Lambda to S3
        run: |
          DEPLOY_BUCKET="${{ steps.env.outputs.ENV }}-rozellerz-deploy"
          aws s3 cp lambda-api.zip "s3://${DEPLOY_BUCKET}/lambda/api.zip"

      # =============================================
      #  Deploy stacks in dependency order
      # =============================================

      - name: "Stack 1/5: Foundation"
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/01-foundation.yml \
            --stack-name ${{ steps.env.outputs.PREFIX }}-foundation \
            --parameter-overrides \
              Environment=${{ steps.env.outputs.ENV }} \
              DomainName=${{ env.DOMAIN_NAME }} \
            --no-fail-on-empty-changeset

      - name: "Stack 2/5: WAF"
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/02-waf.yml \
            --stack-name ${{ steps.env.outputs.PREFIX }}-waf \
            --parameter-overrides \
              Environment=${{ steps.env.outputs.ENV }} \
            --no-fail-on-empty-changeset

      - name: "Stack 3/5: API"
        run: |
          DEPLOY_BUCKET="${{ steps.env.outputs.ENV }}-rozellerz-deploy"
          aws cloudformation deploy \
            --template-file cloudformation/03-api.yml \
            --stack-name ${{ steps.env.outputs.PREFIX }}-api \
            --parameter-overrides \
              Environment=${{ steps.env.outputs.ENV }} \
              DomainName=${{ env.DOMAIN_NAME }} \
              DeployBucketName="$DEPLOY_BUCKET" \
              WriteApiSecret="${{ secrets.WRITE_API_SECRET }}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM

      - name: "Stack 4/5: CDN"
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/04-cdn.yml \
            --stack-name ${{ steps.env.outputs.PREFIX }}-cdn \
            --parameter-overrides \
              Environment=${{ steps.env.outputs.ENV }} \
              DomainName=${{ env.DOMAIN_NAME }} \
              AcmCertificateArn="${{ steps.env.outputs.CERT_ARN }}" \
            --no-fail-on-empty-changeset

      - name: "Stack 5/5: Monitoring"
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/05-monitoring.yml \
            --stack-name ${{ steps.env.outputs.PREFIX }}-monitoring \
            --parameter-overrides \
              Environment=${{ steps.env.outputs.ENV }} \
            --no-fail-on-empty-changeset

      # =============================================
      #  Post-deploy: sync, seed, invalidate
      # =============================================

      - name: Get stack outputs
        id: stack
        run: |
          get_export() {
            aws cloudformation list-exports \
              --query "Exports[?Name=='$1'].Value" --output text
          }
          ENV="${{ steps.env.outputs.ENV }}"
          echo "BUCKET=$(get_export ${ENV}-rozellerz-site-bucket)" >> $GITHUB_OUTPUT
          echo "CF_ID=$(get_export ${ENV}-rozellerz-cf-id)" >> $GITHUB_OUTPUT
          echo "CF_DOMAIN=$(get_export ${ENV}-rozellerz-cf-domain)" >> $GITHUB_OUTPUT
          echo "TABLE=$(get_export ${ENV}-rozellerz-pages-table)" >> $GITHUB_OUTPUT
          echo "LAMBDA=$(get_export ${ENV}-rozellerz-lambda-name)" >> $GITHUB_OUTPUT
          echo "API=$(get_export ${ENV}-rozellerz-api-endpoint)" >> $GITHUB_OUTPUT

      - name: Sync site to S3
        run: |
          aws s3 sync site/ s3://${{ steps.stack.outputs.BUCKET }}/ \
            --delete --cache-control "max-age=86400"
          aws s3 cp site/index.html s3://${{ steps.stack.outputs.BUCKET }}/index.html \
            --content-type text/html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Update Lambda function code
        run: |
          DEPLOY_BUCKET="${{ steps.env.outputs.ENV }}-rozellerz-deploy"
          aws lambda update-function-code \
            --function-name ${{ steps.stack.outputs.LAMBDA }} \
            --s3-bucket "$DEPLOY_BUCKET" \
            --s3-key lambda/api.zip \
            --publish

      - name: Seed DynamoDB
        if: github.event.inputs.seed_db == 'true'
        run: |
          pip install boto3
          python scripts/seed.py ${{ steps.stack.outputs.TABLE }}

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.CF_ID }} \
            --paths "/*"

      - name: Deploy summary
        run: |
          ENV="${{ steps.env.outputs.ENV }}"
          echo "## 🚀 Deployed to $ENV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | Name |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Foundation | rozellerz-${ENV}-foundation |" >> $GITHUB_STEP_SUMMARY
          echo "| WAF | rozellerz-${ENV}-waf |" >> $GITHUB_STEP_SUMMARY
          echo "| API | rozellerz-${ENV}-api |" >> $GITHUB_STEP_SUMMARY
          echo "| CDN | rozellerz-${ENV}-cdn |" >> $GITHUB_STEP_SUMMARY
          echo "| Monitoring | rozellerz-${ENV}-monitoring |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Site** | https://${{ steps.stack.outputs.CF_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | ${{ steps.stack.outputs.API }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bucket** | ${{ steps.stack.outputs.BUCKET }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **CloudFront** | ${{ steps.stack.outputs.CF_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **DynamoDB** | ${{ steps.stack.outputs.TABLE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Lambda** | ${{ steps.stack.outputs.LAMBDA }} |" >> $GITHUB_STEP_SUMMARY
